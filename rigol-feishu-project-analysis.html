:root {

*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg-primary);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
/* 桌面端单屏不滚动 */

  .hl-core-ol{font-size:12px;line-height:1.35}
  .hl-core-ol li{margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hl-right{display:flex;flex-direction:column;gap:0}
  .kpi-groups{display:flex;gap:12px;align-items:flex-start}
  .kpi-group{flex:1;display:flex;align-items:center;gap:8px}
  .kpi-group-label{font-size:10px;margin:0;white-space:nowrap;flex-shrink:0}
  .kpi-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:3px 6px;margin-bottom:0}
  .kpi-cell{padding:2px 4px}
  .kpi-val{font-size:16px}
  .kpi-lbl{font-size:9px}
  .kpi-sub{font-size:9px;color:rgba(126,184,218,0.45);margin-top:1px;margin-left:0;padding-left:0}
  .hl-sub{font-size:10px;margin-left:0;display:none}
}
#app{display:flex;flex-direction:column;padding:8px 12px;gap:6px}
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:36px}
.header h1{font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:1px}
.filter-group{display:flex;gap:4px}
.filter-btn{padding:4px 12px;border:1px solid var(--border-dim);background:transparent;color:var(--text-secondary);border-radius:4px;font-size:12px;cursor:pointer;transition:all 200ms;font-family:inherit}
.filter-btn:hover{border-color:var(--accent-cyan);color:var(--text-primary)}
.filter-btn.active{background:rgba(0,212,255,0.15);border-color:var(--accent-cyan);color:var(--accent-cyan)}
.headline-bar{flex-shrink:0;background:rgba(0,212,255,0.03);border-left:3px solid var(--accent-cyan);border-radius:0 6px 6px 0;padding:10px 16px}
.hl-line{display:flex;align-items:center;gap:6px;line-height:1.6;font-size:15px}
.hl-line b{color:var(--text-primary);font-weight:600}
.hl-dot{font-size:10px;flex-shrink:0}
.hl-text{color:var(--text-secondary)}
.hl-text b{color:var(--text-primary)}
.hl-sub{display:none}
.kpi-sub{font-size:10px;color:rgba(126,184,218,0.45);margin-top:3px;line-height:1.3}
.hl-core{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(0,212,255,0.15)}
.hl-core-title{font-size:12px;font-weight:700;color:var(--accent-cyan);letter-spacing:2px;margin-bottom:8px}
.hl-core-ol{margin:0;padding-left:1.35em;color:var(--text-primary);font-size:14px;line-height:1.55}
.hl-core-ol li{margin-bottom:6px;padding-left:4px}
.hl-core-ol li:last-child{margin-bottom:0}
.hl-core-ol li b{color:var(--accent-cyan);font-weight:600}
.hl-core-ol li::marker{color:var(--accent-cyan);font-weight:700}
.hl-core-note{font-size:11px;color:rgba(126,184,218,0.55);line-height:1.4;margin-top:4px;margin-bottom:0;font-weight:400}
.hl-kpi-row{font-size:13px;color:var(--text-secondary);line-height:1.5}
.hl-kpi-row b{color:var(--text-primary);font-weight:600}
.hl-kpi-label{font-size:11px;font-weight:600;color:rgba(126,184,218,0.55);letter-spacing:1px;margin-bottom:6px;margin-top:2px}
.kpi-group-label{font-size:9px;color:rgba(126,184,218,0.5);letter-spacing:1px;margin-bottom:2px;margin-top:4px;font-weight:600}
.kpi-group-label:first-child{margin-top:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px 8px;margin-bottom:4px}
.kpi-5{grid-template-columns:repeat(5,1fr)}
.kpi-3{grid-template-columns:repeat(3,1fr)}
.kpi-cell{text-align:center;padding:4px 2px;border-radius:4px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.08)}
.kpi-val{font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.2}
.kpi-val .kpi-pct{font-size:12px;font-weight:400;color:var(--text-secondary);margin-left:2px}
.kpi-lbl{font-size:10px;color:var(--text-secondary);margin-top:1px;line-height:1.2}
.kpi-val.accent-cyan{color:var(--accent-cyan)}
.kpi-val.accent-green{color:var(--accent-green)}
.kpi-val.accent-amber{color:var(--accent-amber)}
.hl-line+.hl-line{margin-top:1px}
.hl-sub+.hl-line{margin-top:2px}
.chart-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:6px;min-height:0}
.panel{background:var(--bg-panel);border-radius:6px;border-top:2px solid var(--accent-cyan);padding:8px 10px;display:flex;flex-direction:column;overflow:hidden}
.panel-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-shrink:0}
.panel-title{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap}
.panel-subtitle{font-size:10px;color:var(--text-secondary);opacity:0.6}
.chart-box{flex:1;min-height:0}
.progress-section{display:flex;flex-direction:column;gap:5px;margin-bottom:4px;flex-shrink:0}
.progress-row{display:flex;align-items:center;gap:8px}
.progress-label{font-size:11px;color:var(--text-secondary);width:56px;flex-shrink:0}
.progress-bar{flex:1;height:10px;background:rgba(26,58,92,0.6);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;transition:width 600ms ease}
.progress-value{font-size:12px;font-weight:600;color:var(--text-primary);width:44px;text-align:right;flex-shrink:0}
.footer{flex-shrink:0;text-align:center;font-size:10px;color:rgba(126,184,218,0.4);padding:4px 0;border-top:1px solid var(--border-dim)}

  .chart-grid{flex:0 0 auto;grid-template-columns:1fr;grid-template-rows:none;grid-auto-rows:minmax(300px,auto);gap:10px}
  .panel{min-height:280px;overflow:visible}
  .chart-box{min-height:240px}
  .header{flex-direction:row;flex-wrap:wrap;height:auto;gap:6px 12px;align-items:center;position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-primary);padding:8px 12px 6px;border-bottom:1px solid var(--border-dim)}
  #app{padding-top:72px}

          '<div class="kpi-cell"><div class="kpi-val">'+SEAT.used_seats+'<span class="kpi-pct">/ '+hc+' · '+cov+'%</span></div><div class="kpi-lbl">开通 / 在岗 · 覆盖率</div></div>'+
          '<div class="kpi-cell"><div class="kpi-val accent-green">'+SEAT.active_30d+'<span class="kpi-pct">'+ar+'%</span></div><div class="kpi-lbl">月活跃 MAU</div></div>'+
          '<div class="kpi-cell"><div class="kpi-val accent-cyan">'+ACT_DAILY_AVG+'<span class="kpi-pct">min</span></div><div class="kpi-lbl">人均时长（每日）</div></div>'+
        '</div>'+
        '<div class="kpi-sub">MAU口径：末次登录30天内 · 人均时长：飞书官方统计 · 席位'+SEAT.total_seats+'为合同上限</div>'+
      '</div>'+
    '</div>'+
    '<div class="hl-sub">活跃口径：末次登录30天内 · 采购席位'+SEAT.total_seats+'为合同上限</div>'+
    '</div>';
}

function renderProgress(){
  var sr=(SEAT.used_seats/SEAT.total_seats*100).toFixed(1);
  var ar=(SEAT.active_30d/SEAT.used_seats*100).toFixed(1);
  document.getElementById('pf1').style.cssText='width:'+sr+'%;background:var(--accent-cyan)';
  document.getElementById('pv1').textContent=sr+'%';
  document.getElementById('pf2').style.cssText='width:'+ar+'%;background:var(--accent-green)';
  document.getElementById('pv2').textContent=ar+'%';
}

function renderC1(){
  var dept=SEAT.dept_stats.slice().sort(function(a,b){return b.active_30d-a.active_30d}).slice(0,8).reverse();
  charts.c1.setOption({
    tooltip:{backgroundColor:'rgba(13,31,60,0.95)',borderColor:'#1a3a5c',textStyle:{color:'#e8f4fd',fontSize:12},formatter:function(p){var d=dept[p.dataIndex];return d.dept+'<br/>活跃: '+d.active_30d+'/'+d.total+' ('+Math.round(d.active_30d/d.total*100)+'%)'}},
    grid:{top:4,right:82,bottom:4,left:4,containLabel:true},
    xAxis:{type:'value',show:false},
    yAxis:{type:'category',data:dept.map(function(d){return d.dept}),axisLabel:{color:'#7eb8da',fontSize:10,width:95,overflow:'truncate'},axisTick:{show:false},axisLine:{show:false}},
    series:[{type:'bar',barWidth:14,
      data:dept.map(function(d){var r=d.total>0?d.active_30d/d.total:0;return{value:d.active_30d,itemStyle:{color:r>=0.8?'#00e676':r>=0.6?'#ffc107':'#ff5252',borderRadius:[0,3,3,0]}}}),
      label:{show:true,position:'right',formatter:function(p){var d=dept[p.dataIndex];return d.active_30d+'/'+d.total+' '+Math.round(d.active_30d/d.total*100)+'%'},color:'#7eb8da',fontSize:10}
    }]
  });
}

function renderDonut(cid,tid,data,label){
  var cnt=countBy(data,'st');var total=data.length;
  var running=cnt['进行中']||0;var pct=total?(running/total*100).toFixed(1):'0';
  if(tid)document.getElementById(tid).innerHTML=label+' | <span style="color:#00e676">运行中 '+running+'（'+pct+'%）</span>';
  var pd=SO.filter(function(s){return cnt[s]}).map(function(s){return{name:s,value:cnt[s],itemStyle:{color:SC[s]}}});
  charts[cid].setOption({
    tooltip:{backgroundColor:'rgba(13,31,60,0.95)',borderColor:'#1a3a5c',textStyle:{color:'#e8f4fd',fontSize:12},formatter:'{b}: {c} ({d}%)'},
    title:{text:String(total),subtext:'总计',left:'center',top:'center',textStyle:{fontSize:22,color:'#e8f4fd',fontWeight:'bold'},subtextStyle:{fontSize:10,color:'#7eb8da'}},
    series:[{type:'pie',radius:['40%','68%'],center:['50%','52%'],data:pd,
      label:{show:true,formatter:'{b}\n{c}',color:'#7eb8da',fontSize:10,lineHeight:14},
      labelLine:{lineStyle:{color:'#1a3a5c'}},emphasis:{scaleSize:3}
    }]
  });
}

function renderC3(data){
  var cnt=countBy(data,'p');var other=0;var items=[];
  PO.forEach(function(ph){var c=cnt[ph]||0;if(c>=3)items.push({name:ph,value:c});else other+=c});
  Object.keys(cnt).forEach(function(ph){if(ph&&PO.indexOf(ph)<0){if(cnt[ph]>=3)items.push({name:ph,value:cnt[ph]});else other+=cnt[ph]}});
  if(other>0)items.push({name:'其他',value:other});
  items.reverse();
  charts.c3.setOption({
    tooltip:TT,
    grid:{top:4,right:36,bottom:4,left:4,containLabel:true},
    xAxis:{type:'value',show:false},
    yAxis:{type:'category',data:items.map(function(i){return i.name}),axisLabel:{color:'#7eb8da',fontSize:10},axisTick:{show:false},axisLine:{show:false}},
    series:[{type:'bar',data:items.map(function(i){return i.value}),barWidth:14,
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#1a3a5c'},{offset:1,color:'#448aff'}]),borderRadius:[0,3,3,0]},
      label:{show:true,position:'right',color:'#7eb8da',fontSize:10}
    }]
  });
}

function renderC4(data){
  var cnt={};
  data.forEach(function(p){var m=p.c.slice(0,7);if(m)cnt[m]=(cnt[m]||0)+1});
  var months=Object.keys(cnt).sort();var vals=months.map(function(m){return cnt[m]});
  if(months.length===0)return;
  var maxI=0;vals.forEach(function(v,i){if(v>vals[maxI])maxI=i});
  var mpLabel=months[maxI]==='2026-03'?'UVerse内测\n批量立项':String(vals[maxI]);
  charts.c4.setOption({
    tooltip:{backgroundColor:'rgba(13,31,60,0.95)',borderColor:'#1a3a5c',textStyle:{color:'#e8f4fd',fontSize:12},trigger:'axis'},
    grid:{top:30,right:12,bottom:20,left:36},
    xAxis:{type:'category',data:months,axisLabel:{color:'#7eb8da',fontSize:9,rotate:35},axisLine:{lineStyle:{color:'#1a3a5c'}},axisTick:{lineStyle:{color:'#1a3a5c'}}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'#1a3a5c',type:'dashed'}},axisLabel:{color:'#7eb8da',fontSize:10}},
    series:[{type:'line',data:vals,smooth:true,symbol:'circle',symbolSize:4,
      lineStyle:{color:'#00d4ff',width:2},itemStyle:{color:'#00d4ff'},
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,212,255,0.3)'},{offset:1,color:'rgba(0,212,255,0.02)'}])},
      markPoint:{data:[{coord:[months[maxI],vals[maxI]],symbol:'pin',symbolSize:36,
        itemStyle:{color:'#ffc107'},label:{show:true,formatter:mpLabel,fontSize:9,color:'#fff',lineHeight:12}}]}
    }]
  });
}

function renderC5(data){
  var cnt=countBy(data,'bu');
  var items=Object.keys(cnt).map(function(k){return{name:k||'未分配',value:cnt[k]}}).sort(function(a,b){return b.value-a.value});
  if(items.length>8){
    var rest=0;for(var i=8;i<items.length;i++)rest+=items[i].value;
    items=items.slice(0,8);if(rest>0)items.push({name:'其他',value:rest});
  }
  items.reverse();
  charts.c5.setOption({
    tooltip:TT,
    grid:{top:4,right:36,bottom:4,left:4,containLabel:true},
    xAxis:{type:'value',show:false},
    yAxis:{type:'category',data:items.map(function(i){return i.name}),axisLabel:{color:'#7eb8da',fontSize:10,width:110,overflow:'truncate'},axisTick:{show:false},axisLine:{show:false}},
    series:[{type:'bar',data:items.map(function(i){return i.value}),barWidth:14,
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#1a3a5c'},{offset:1,color:'#b388ff'}]),borderRadius:[0,3,3,0]},
      label:{show:true,position:'right',color:'#7eb8da',fontSize:10}
    }]
  });
}

function renderC6(data){
  var gen=data.filter(function(p){return p.s==='g'});
  var rd=data.filter(function(p){return p.s==='r'});
  var sts=['进行中','已结项','已终止','未开始','延期'];
  charts.c6.setOption({
    tooltip:{backgroundColor:'rgba(13,31,60,0.95)',borderColor:'#1a3a5c',textStyle:{color:'#e8f4fd',fontSize:12},trigger:'axis'},
    legend:{data:['通用项目','研发项目'],textStyle:{color:'#7eb8da',fontSize:10},top:0,right:0,itemWidth:12,itemHeight:8},
    grid:{top:24,right:12,bottom:4,left:4,containLabel:true},
    xAxis:{type:'category',data:sts,axisLabel:{color:'#7eb8da',fontSize:10},axisLine:{lineStyle:{color:'#1a3a5c'}}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'#1a3a5c',type:'dashed'}},axisLabel:{color:'#7eb8da',fontSize:10}},
    series:[
      {name:'通用项目',type:'bar',data:sts.map(function(s){return gen.filter(function(p){return p.st===s}).length}),itemStyle:{color:'#448aff',borderRadius:[3,3,0,0]},barGap:'20%'},
      {name:'研发项目',type:'bar',data:sts.map(function(s){return rd.filter(function(p){return p.st===s}).length}),itemStyle:{color:'#b388ff',borderRadius:[3,3,0,0]}}
    ]
  });
}

function renderC8(){
  var weeks=ACT.map(function(a){return a.w.slice(5)});
  var wauData=ACT.map(function(a){return a.wau});
  var kuData=ACT.map(function(a){return a.ku});
  var amData=ACT.map(function(a){return a.am});
  var minIdx=0;wauData.forEach(function(v,i){if(v<wauData[minIdx])minIdx=i});
  var mpData=[];
  if(ACT[minIdx]&&ACT[minIdx].wau<50){
    mpData.push({coord:[weeks[minIdx],wauData[minIdx]],symbol:'pin',symbolSize:30,
      itemStyle:{color:'#ffc107'},label:{show:true,formatter:'春节',fontSize:9,color:'#fff'}});
  }
  charts.c8.setOption({
    tooltip:{backgroundColor:'rgba(13,31,60,0.95)',borderColor:'#1a3a5c',textStyle:{color:'#e8f4fd',fontSize:11},trigger:'axis',
      formatter:function(ps){var h=ps[0].axisValue;ps.forEach(function(p){h+='<br/>'+p.marker+p.seriesName+': '+p.value+(p.seriesIndex===2?' min':'')});return h}},
    legend:{data:['Meego WAU','关键行为用户','人均时长(min)'],textStyle:{color:'#7eb8da',fontSize:9},top:0,left:0,itemWidth:10,itemHeight:6,itemGap:8},
    grid:{top:18,right:38,bottom:20,left:32},
    xAxis:{type:'category',data:weeks,axisLabel:{color:'#7eb8da',fontSize:8,rotate:35,interval:function(i){return i%4===0}},axisLine:{lineStyle:{color:'#1a3a5c'}},axisTick:{lineStyle:{color:'#1a3a5c'}}},
    yAxis:[
      {type:'value',nameTextStyle:{color:'#7eb8da',fontSize:9},splitLine:{lineStyle:{color:'#1a3a5c',type:'dashed'}},axisLabel:{color:'#7eb8da',fontSize:9}},
      {type:'value',name:'min/日',nameTextStyle:{color:'#7eb8da',fontSize:8,padding:[0,0,0,-30]},nameLocation:'end',splitLine:{show:false},axisLabel:{color:'#7eb8da',fontSize:9}}
    ],
    series:[
      {name:'Meego WAU',type:'line',data:wauData,smooth:true,symbol:'none',lineStyle:{color:'#00d4ff',width:2},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,212,255,0.25)'},{offset:1,color:'rgba(0,212,255,0.02)'}])},
        markPoint:{data:mpData}},
      {name:'关键行为用户',type:'line',data:kuData,smooth:true,symbol:'none',lineStyle:{color:'#b388ff',width:1.5}},
      {name:'人均时长(min)',type:'line',yAxisIndex:1,data:amData,smooth:true,symbol:'none',lineStyle:{color:'#00e676',width:1.5,type:'dashed'}}
    ]
  });
}

function renderAll(){
  var d=filterByRange(curRange);
  renderDonut('c2','t2',d,'项目状态');
  renderC3(d);
  renderC4(d);
  renderC5(d);
  renderC6(d);
  var rdD=d.filter(function(p){return p.s==='r'});
  renderDonut('c7','t7',rdD,'研发项目状态');
}

document.addEventListener('DOMContentLoaded',function(){
  ['c1','c2','c3','c4','c5','c6','c7','c8'].forEach(function(id){
    charts[id]=echarts.init(document.getElementById(id));
  });
  renderHeadline();
  renderProgress();
  renderC1();
  renderC8();
  renderAll();
  function resizeCharts(){Object.values(charts).forEach(function(c){c.resize()})}
  requestAnimationFrame(function(){setTimeout(resizeCharts,150)});
  window.addEventListener('orientationchange',function(){setTimeout(resizeCharts,280)});
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
      this.classList.add('active');
      curRange=this.dataset.range;
      renderAll();
      if(window.matchMedia('(max-width:768px)').matches){
        document.getElementById('chartArea').scrollIntoView({behavior:'smooth',block:'start'});
      }
    });
  });
  var rt;
  window.addEventListener('resize',function(){
    clearTimeout(rt);
    rt=setTimeout(function(){Object.values(charts).forEach(function(c){c.resize()})},200);
  });
});
</script>
</body>
</html>
